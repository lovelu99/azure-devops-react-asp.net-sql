namespace: three-tier

azure:
  workloadIdentityClientId: "0f48880b-ce16-4970-9f2a-dfd312bc2c41"
  keyVaultName: "kv-3tier-app-lovelu2"
  tenantId: "2a1f0b68-fdde-4151-9edf-97628de42914"

frontend:
  replicaCount: 2
  image:
    repository: loveluacr.azurecr.io/frontend
    tag: "41"
    pullPolicy: Always
  containerPort: 8080
  service:
    name: frontend-service
    port: 80
    type: ClusterIP
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  probes:
    readiness:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      path: /
      initialDelaySeconds: 10
      periodSeconds: 20
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1

backend:
  replicaCount: 2
  serviceAccountName: backend-sa
  workloadIdentityEnabled: true
  image:
    repository: loveluacr.azurecr.io/backend-api
    tag: "41"
    pullPolicy: Always
  containerPort: 8080
  service:
    name: backend-service
    port: 8080
    type: ClusterIP
  env:
    aspnetcoreUrls: "http://+:8080"
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  secret:
    name: backend-secrets
    sqlConnectionKey: SqlConnectionString
  probes:
    readiness:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 10
    liveness:
      path: /health
      initialDelaySeconds: 20
      periodSeconds: 20
  serviceAccount:
    name: backend-sa
  keyVault:
    enabled: true
    mountPath: "/mnt/secrets-store"
    secretProviderClassName: backend-keyvault-secrets
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1  

ingress:
  enabled: true
  className: webapprouting.kubernetes.azure.com
  host: ""

networkPolicy:
  enabled: true