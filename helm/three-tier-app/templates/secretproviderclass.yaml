apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.backend.keyVault.secretProviderClassName }}
  namespace: {{ .Values.namespace }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: {{ .Values.azure.workloadIdentityClientId | quote }}
    keyvaultName: {{ .Values.azure.keyVaultName | quote }}
    tenantId: {{ .Values.azure.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: {{ .Values.backend.secret.sqlConnectionKey }}
          objectType: secret
  secretObjects:
    - secretName: {{ .Values.backend.secret.name }}
      type: Opaque
      data:
        - objectName: {{ .Values.backend.secret.sqlConnectionKey }}
          key: {{ .Values.backend.secret.sqlConnectionKey }}